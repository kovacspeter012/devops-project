name: Docker Image CI

on:
  workflow_dispatch:

  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: generate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV


    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build ./devops-backend --file ./devops-backend/Dockerfile --tag ghcr.io/kovacspeter012/k8s-project-backend-kp:$IMAGE_TAG
        docker build ./devops-frontend --file ./devops-frontend/Dockerfile --tag ghcr.io/kovacspeter012/k8s-project-frontend-kp:$IMAGE_TAG

        docker login ghcr.io -u kovacspeter012 -p ${{ secrets.GHCR_TOKEN }}

        docker push ghcr.io/kovacspeter012/k8s-project-frontend-kp:$IMAGE_TAG
        docker push ghcr.io/kovacspeter012/k8s-project-backend-kp:$IMAGE_TAG

        sed -i 's|image: ghcr.io/kovacspeter012/k8s-project-frontend-kp:.*|image: ghcr.io/kovacspeter012/k8s-project-frontend-kp:'"$IMAGE_TAG"'|' deployment.yaml
        sed -i 's|image: ghcr.io/kovacspeter012/k8s-project-backend-kp:.*|image: ghcr.io/kovacspeter012/k8s-project-backend-kp:'"$IMAGE_TAG"'|' deployment.yaml

        git config --global user.name "kovacspeter012"
        git config --global user.email "kovacspeter@students.jedlik.eu"
        git add deployment.yaml
        git commit -m "update K8S deployment.yaml file"
        git push

        mkdir -p ~/.kube
        echo "${{ secrets.K8S_CONFIG_BASE64 }}" | base64 -d > ~/.kube/config
        kubectl apply -f deployment.yaml
